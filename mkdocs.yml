site_name: bidkit
site_description: >-
  bidkit — a modern, typed Python SDK for the eBay REST APIs. Sync + async clients,
  Pydantic models, OAuth, retries, pagination, and digital signatures. Unofficial.
site_url: https://heyalexej.github.io/bidkit/
repo_url: https://github.com/heyalexej/bidkit
repo_name: heyalexej/bidkit
copyright: >-
  MIT licensed. Not affiliated with or endorsed by eBay Inc.;
  "eBay" is a trademark of eBay Inc.

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - toc.follow

plugins:
  - search
  - gen-files:
      scripts:
        - scripts/gen_ref_pages.py
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            members_order: source
            docstring_style: sphinx
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details

nav:
  - Home: index.md
  - Guides:
      - eBay OAuth in Python: guides/authentication.md
      - Configuration: guides/configuration.md
      - Paginate eBay API results: guides/pagination.md
      - Retries & rate limits: guides/retries.md
      - Digital signatures (Finances API): guides/signing.md
      - Verify eBay push notifications: guides/notifications.md
      - Logging & observability: guides/logging.md
  - API reference:
      - Supported eBay APIs: reference/apis.md
      - Client & configuration: reference/client.md
      - Auth & token caches: reference/auth.md
      - Notifications: reference/notifications.md
      - Pagination & errors: reference/helpers.md
      - Generated (all 41 APIs): reference/generated/index.md
  - bidkit vs ebaysdk: comparison.md
